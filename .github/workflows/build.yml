name: bazel-build CI

on:
  push: 
    branches:
      - master

  pull_request:
    branches: 
      - master

jobs:
  ubuntu-build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - name: Mount bazel cache
        uses: actions/cache@v3
        with:
          path: "/home/runner/.cache/bazel"
          key: bazel
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.10'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev

      - name: Configure Python paths
        run: |
          echo "PYTHON_BIN_PATH=$(which python3)" >> $GITHUB_ENV
          echo "PYTHON_INCLUDE=$(python3 -c 'import sysconfig; print(sysconfig.get_path(\"include\"))')" >> $GITHUB_ENV
      
      - name: Clean Bazel cache
        run: bazel clean --expunge
          
      - name: build
        shell: bash
        env:
            CC: gcc-11
            CXX: g++-11
        run: |
          sudo apt install gcc-11 g++-11
          bazel build ... \
          --action_env=PYTHON_BIN_PATH \
          --action_env=PYTHON_INCLUDE
