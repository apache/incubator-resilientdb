syntax = "proto3";

package resdb.storage;

message TieredIndexEntry {
  string key = 1;
  string key_range_start = 2;
  string key_range_end = 3;
  string ipfs_cid = 4;
  uint64 checkpoint_height = 5;
  int64 migrated_at_timestamp = 6;
  bool has_versions = 7;
  string versions_cid = 8;
}

message TieredIndex {
  repeated TieredIndexEntry entries = 1;
  int32 version = 2;
  int64 last_updated_timestamp = 3;
}

message IndexManifest {
  message RangeMapping {
    string start_key = 1;
    string end_key = 2;
    string ipfs_cid = 3;
    uint64 min_checkpoint = 4;
    uint64 max_checkpoint = 5;
  }
  
  repeated RangeMapping range_mappings = 1;
  uint64 total_keys = 2;
  uint64 cold_keys = 3;
  int32 version = 4;
  int64 last_updated_timestamp = 5;
}